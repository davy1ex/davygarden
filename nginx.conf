# Paste this into Coolify → Application → Nginx (Custom Nginx Configuration).
# Quartz serves pages as file.html without .html in the URL.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~* \.(css|js)$ {
        if ($uri ~* "-[0-9a-f]{8}\.") {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
